<svg xmlns="http://www.w3.org/2000/svg" width="840" height="400" viewBox="0 0 840 400">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
    <style>
      .box { fill:#f7f7f7; stroke:#333; stroke-width:1.6; rx:12; }
      .dark { fill:#e8eef7; stroke:#333; stroke-width:1.6; rx:12; }
      .green { fill:#e9f5ec; stroke:#333; stroke-width:1.6; rx:12; }
      .orange { fill:#fff1df; stroke:#333; stroke-width:1.6; rx:12; }
      .pink { fill:#f8e9ef; stroke:#333; stroke-width:1.6; rx:12; }
      .text { font-family: "Arial", "Microsoft YaHei", sans-serif; font-size:16px; fill:#111; }
      .small { font-family: "Arial", "Microsoft YaHei", sans-serif; font-size:13px; fill:#333; }
      .title { font-family: "Arial", "Microsoft YaHei", sans-serif; font-size:22px; font-weight:bold; fill:#111; }
      .line { stroke:#333; stroke-width:1.6; fill:none; marker-end:url(#arrow); }
      .plainline { stroke:#333; stroke-width:1.2; fill:none; }
    </style>
  </defs>
  
<text x="40" y="38" class="title">ARM64 Linux 启动总览</text>
<rect x="60" y="75" width="190" height="55" class="orange"/><text x="95" y="109" class="text">CPU Reset</text>
<line x1="250" y1="102" x2="310" y2="102" class="line"/>
<rect x="310" y="75" width="190" height="55" class="orange"/><text x="365" y="109" class="text">BootROM</text>
<line x1="500" y1="102" x2="560" y2="102" class="line"/>
<rect x="560" y="75" width="220" height="55" class="pink"/><text x="598" y="109" class="text">TF-A / Firmware</text>

<line x1="670" y1="130" x2="670" y2="185" class="line"/>
<rect x="560" y="185" width="220" height="55" class="dark"/><text x="612" y="219" class="text">U-Boot / EDK2</text>
<line x1="560" y1="212" x2="500" y2="212" class="line"/>
<rect x="310" y="185" width="190" height="55" class="green"/><text x="348" y="219" class="text">Linux Image</text>
<line x1="310" y1="212" x2="250" y2="212" class="line"/>
<rect x="60" y="185" width="190" height="55" class="green"/><text x="119" y="219" class="text">head.S</text>

<line x1="155" y1="240" x2="155" y2="300" class="line"/>
<rect x="60" y="300" width="190" height="55" class="green"/><text x="103" y="334" class="text">start_kernel()</text>
<line x1="250" y1="327" x2="310" y2="327" class="line"/>
<rect x="310" y="300" width="190" height="55" class="green"/><text x="361" y="334" class="text">kernel_init</text>
<line x1="500" y1="327" x2="560" y2="327" class="line"/>
<rect x="560" y="300" width="220" height="55" class="dark"/><text x="596" y="334" class="text">init / systemd</text>

</svg>