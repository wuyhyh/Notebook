<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="360" viewBox="0 0 1080 360">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
    <style>
      .box { fill:#f7f7f7; stroke:#333; stroke-width:1.6; rx:12; }
      .dark { fill:#e8eef7; stroke:#333; stroke-width:1.6; rx:12; }
      .green { fill:#e9f5ec; stroke:#333; stroke-width:1.6; rx:12; }
      .orange { fill:#fff1df; stroke:#333; stroke-width:1.6; rx:12; }
      .pink { fill:#f8e9ef; stroke:#333; stroke-width:1.6; rx:12; }
      .text { font-family: "Arial", "Microsoft YaHei", sans-serif; font-size:16px; fill:#111; }
      .small { font-family: "Arial", "Microsoft YaHei", sans-serif; font-size:13px; fill:#333; }
      .title { font-family: "Arial", "Microsoft YaHei", sans-serif; font-size:22px; font-weight:bold; fill:#111; }
      .line { stroke:#333; stroke-width:1.6; fill:none; marker-end:url(#arrow); }
      .plainline { stroke:#333; stroke-width:1.2; fill:none; }
    </style>
  </defs>
  
<text x="40" y="38" class="title">Device Tree 在启动中的作用</text>
<rect x="70" y="90" width="180" height="70" class="orange"/><text x="118" y="130" class="text">硬件板卡</text>
<line x1="250" y1="125" x2="325" y2="125" class="line"/>
<rect x="325" y="90" width="180" height="70" class="dark"/><text x="378" y="119" class="text">DTS/DTSI</text><text x="374" y="144" class="small">硬件描述源码</text>
<line x1="505" y1="125" x2="580" y2="125" class="line"/>
<rect x="580" y="90" width="180" height="70" class="dark"/><text x="650" y="119" class="text">DTB</text><text x="619" y="144" class="small">编译后的二进制</text>
<line x1="760" y1="125" x2="835" y2="125" class="line"/>
<rect x="835" y="90" width="190" height="70" class="green"/><text x="875" y="119" class="text">Linux Kernel</text><text x="862" y="144" class="small">解析硬件信息</text>

<rect x="260" y="245" width="620" height="80" class="pink"/>
<text x="300" y="278" class="text">DTB 影响启动早期的关键内容</text>
<text x="300" y="306" class="small">/chosen/bootargs、/memory、/cpus、串口、中断控制器、存储控制器</text>

</svg>