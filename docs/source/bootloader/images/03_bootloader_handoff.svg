<svg xmlns="http://www.w3.org/2000/svg" width="1030" height="400" viewBox="0 0 1030 400">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
    <style>
      .box { fill:#f7f7f7; stroke:#333; stroke-width:1.6; rx:12; }
      .dark { fill:#e8eef7; stroke:#333; stroke-width:1.6; rx:12; }
      .green { fill:#e9f5ec; stroke:#333; stroke-width:1.6; rx:12; }
      .orange { fill:#fff1df; stroke:#333; stroke-width:1.6; rx:12; }
      .pink { fill:#f8e9ef; stroke:#333; stroke-width:1.6; rx:12; }
      .text { font-family: "Arial", "Microsoft YaHei", sans-serif; font-size:16px; fill:#111; }
      .small { font-family: "Arial", "Microsoft YaHei", sans-serif; font-size:13px; fill:#333; }
      .title { font-family: "Arial", "Microsoft YaHei", sans-serif; font-size:22px; font-weight:bold; fill:#111; }
      .line { stroke:#333; stroke-width:1.6; fill:none; marker-end:url(#arrow); }
      .plainline { stroke:#333; stroke-width:1.2; fill:none; }
    </style>
  </defs>
  
<text x="40" y="38" class="title">Bootloader 向 Kernel 交接</text>
<rect x="70" y="90" width="230" height="90" class="dark"/><text x="133" y="126" class="text">U-Boot / EDK2</text><text x="115" y="154" class="small">加载 Image、DTB、initramfs</text>
<line x1="300" y1="135" x2="395" y2="135" class="line"/>
<rect x="395" y="70" width="250" height="130" class="orange"/><text x="458" y="105" class="text">寄存器约定</text><text x="430" y="135" class="small">x0 = DTB 物理地址</text><text x="430" y="160" class="small">x1 = x2 = x3 = 0</text>
<line x1="645" y1="135" x2="735" y2="135" class="line"/>
<rect x="735" y="90" width="230" height="90" class="green"/><text x="790" y="126" class="text">Linux Image</text><text x="803" y="154" class="small">进入 head.S</text>

<rect x="395" y="260" width="250" height="100" class="pink"/><text x="445" y="294" class="text">启动前状态</text><text x="430" y="322" class="small">MMU off，D-cache off</text><text x="430" y="347" class="small">Kernel/DTB 位于物理内存</text>
<line x1="520" y1="200" x2="520" y2="260" class="line"/>

</svg>